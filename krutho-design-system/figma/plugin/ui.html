<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    color-scheme: light dark;
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 12px;
  }
  body {
    margin: 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 100vh;
    box-sizing: border-box;
  }
  h1 {
    font-size: 13px;
    font-weight: 600;
    margin: 0;
  }
  p {
    margin: 0;
    color: #666;
    line-height: 1.5;
  }
  .drop {
    border: 1px dashed #999;
    border-radius: 4px;
    padding: 20px;
    text-align: center;
    color: #666;
    cursor: pointer;
    transition: background 0.1s;
  }
  .drop:hover, .drop.over { background: rgba(0,0,0,0.04); }
  .row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    font: inherit;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid #999;
    background: white;
    cursor: pointer;
  }
  button.primary {
    background: #0d99ff;
    color: white;
    border-color: #0d99ff;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .log {
    flex: 1;
    overflow-y: auto;
    background: #f5f5f5;
    border-radius: 4px;
    padding: 8px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .log .err { color: #c0251d; }
  .log .ok { color: #166534; }
  input[type=file] { display: none; }
  .conflict {
    background: #fffbeb;
    border: 1px solid #e89a20;
    border-radius: 4px;
    padding: 10px;
    color: #5a1e04;
  }
  .conflict strong { display: block; margin-bottom: 4px; }
  .conflict ul { margin: 4px 0 0 16px; padding: 0; }
</style>
</head>
<body>
  <h1>Krutho Tokens Import</h1>
  <p>Select a payload JSON to create collections, modes, variables, aliases, text styles, and grid styles in this file.</p>

  <label class="drop" id="drop">
    <input type="file" id="file" accept=".json,application/json">
    <span id="dropLabel">Click to choose a JSON file, or drop one here</span>
  </label>

  <div id="conflictBox" class="conflict" style="display:none"></div>

  <div class="row">
    <button id="importBtn" class="primary" disabled>Import</button>
    <button id="closeBtn">Close</button>
  </div>

  <div class="log" id="log"></div>

<script>
  const fileInput = document.getElementById('file');
  const drop = document.getElementById('drop');
  const dropLabel = document.getElementById('dropLabel');
  const importBtn = document.getElementById('importBtn');
  const closeBtn = document.getElementById('closeBtn');
  const log = document.getElementById('log');
  const conflictBox = document.getElementById('conflictBox');

  let payload = null;

  function writeLog(msg, cls) {
    const span = document.createElement('div');
    if (cls) span.className = cls;
    span.textContent = msg;
    log.appendChild(span);
    log.scrollTop = log.scrollHeight;
  }

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      payload = reader.result;
      dropLabel.textContent = file.name;
      conflictBox.style.display = 'none';
      log.innerHTML = '';
      parent.postMessage({ pluginMessage: { type: 'analyse', payload } }, '*');
    };
    reader.readAsText(file);
  }

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadFile(file);
  });
  drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('over'));
  drop.addEventListener('drop', (e) => {
    e.preventDefault();
    drop.classList.remove('over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  importBtn.addEventListener('click', () => {
    if (!payload) return;
    importBtn.disabled = true;
    writeLog('Starting import...');
    parent.postMessage({ pluginMessage: { type: 'import', payload } }, '*');
  });

  closeBtn.addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  });

  window.addEventListener('message', (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'analysis') {
      const conflicts = msg.conflicts || { collections: [], textStyles: [], gridStyles: [] };
      const hasConflicts = conflicts.collections.length > 0 || conflicts.textStyles.length > 0 || (conflicts.gridStyles && conflicts.gridStyles.length > 0);
      if (hasConflicts) {
        const parts = ['<strong>These items already exist and will be deleted before import:</strong>'];
        if (conflicts.collections.length > 0) {
          parts.push('<div style="margin-top:6px;font-weight:600;">Variable collections</div>');
          parts.push('<ul>' + conflicts.collections.map((n) => '<li>' + n + '</li>').join('') + '</ul>');
        }
        if (conflicts.textStyles.length > 0) {
          parts.push('<div style="margin-top:6px;font-weight:600;">Text styles</div>');
          parts.push('<ul>' + conflicts.textStyles.map((n) => '<li>' + n + '</li>').join('') + '</ul>');
        }
        if (conflicts.gridStyles && conflicts.gridStyles.length > 0) {
          parts.push('<div style="margin-top:6px;font-weight:600;">Grid styles</div>');
          parts.push('<ul>' + conflicts.gridStyles.map((n) => '<li>' + n + '</li>').join('') + '</ul>');
        }
        parts.push('<div style="margin-top:8px;font-size:11px;">Variable collections re-created with the same names are automatically remapped by Figma. Text and grid styles are not: nodes using a deleted style become unlinked and must be re-applied.</div>');
        conflictBox.innerHTML = parts.join('');
        conflictBox.style.display = 'block';
      } else {
        conflictBox.style.display = 'none';
      }
      const summary = [];
      if (msg.collectionCount > 0) summary.push(msg.collectionCount + ' collections');
      if (msg.textStyleCount > 0) summary.push(msg.textStyleCount + ' text styles');
      if (msg.gridStyleCount > 0) summary.push(msg.gridStyleCount + ' grid styles');
      writeLog('Ready to import ' + (summary.join(', ') || 'nothing') + '.', 'ok');
      importBtn.disabled = false;
    } else if (msg.type === 'progress') {
      writeLog(msg.message);
    } else if (msg.type === 'done') {
      writeLog(msg.message, 'ok');
      importBtn.disabled = false;
    } else if (msg.type === 'error') {
      writeLog('Error: ' + msg.error, 'err');
      importBtn.disabled = false;
    }
  });
</script>
</body>
</html>
